<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vibe Coding 四个开源项目地图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#20313a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <style>
      .title{font:700 42px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#f8fafc}
      .sub{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#cbd5e1}
      .card-title{font:700 27px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .card-sub{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#334155}
      .tag{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a}
      .small{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#64748b}
      .repo{font:600 17px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="720" rx="0" fill="url(#bg)"/>
  <circle cx="1020" cy="125" r="130" fill="#22c55e" opacity=".08"/>
  <circle cx="145" cy="610" r="170" fill="#38bdf8" opacity=".09"/>
  <text x="72" y="86" class="title">Vibe Coding 开源项目地图</text>
  <text x="72" y="124" class="sub">从想法、提示词、工程化到可复用资产：四个小项目串起一套个人 AI 开发流水线</text>

  <g filter="url(#shadow)">
    <rect x="72" y="178" width="500" height="190" rx="18" fill="#e0f2fe"/>
    <rect x="102" y="207" width="64" height="64" rx="16" fill="#0284c7"/>
    <text x="121" y="249" font-size="34" fill="#fff" font-family="Arial">AI</text>
    <text x="190" y="224" class="card-title">daily-ai</text>
    <text x="190" y="256" class="repo">cuiqingwei/daily-ai</text>
    <text x="102" y="303" class="card-sub">GitHub Actions + 本地 LLM + Tailscale + PushPlus</text>
    <text x="102" y="333" class="small">每天自动搜索 GitHub 热门项目，用本地模型总结后推送到微信。</text>
    <rect x="432" y="210" width="98" height="30" rx="15" fill="#bae6fd"/>
    <text x="457" y="231" class="tag">自动化</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="628" y="178" width="500" height="190" rx="18" fill="#dcfce7"/>
    <rect x="658" y="207" width="64" height="64" rx="16" fill="#16a34a"/>
    <text x="671" y="249" font-size="34" fill="#fff" font-family="Arial">$</text>
    <text x="746" y="224" class="card-title">term-cheat</text>
    <text x="746" y="256" class="repo">cuiqingwei/term-cheat</text>
    <text x="658" y="303" class="card-sub">Vim / tmux / kitty 快捷键在线速查</text>
    <text x="658" y="333" class="small">搜索、收藏、复制、折叠分组，解决终端组合工具的记忆成本。</text>
    <rect x="986" y="210" width="98" height="30" rx="15" fill="#bbf7d0"/>
    <text x="1011" y="231" class="tag">效率</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="420" width="500" height="190" rx="18" fill="#fef3c7"/>
    <rect x="102" y="449" width="64" height="64" rx="16" fill="#d97706"/>
    <text x="115" y="491" font-size="34" fill="#fff" font-family="Arial">P</text>
    <text x="190" y="466" class="card-title">html-ppt</text>
    <text x="190" y="498" class="repo">cuiqingwei/html-ppt</text>
    <text x="102" y="545" class="card-sub">纯 HTML/CSS/JS 的交互式培训课件库</text>
    <text x="102" y="575" class="small">把课程、讲义、演示和动手材料做成浏览器即可运行的资产。</text>
    <rect x="432" y="452" width="98" height="30" rx="15" fill="#fde68a"/>
    <text x="457" y="473" class="tag">内容</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="628" y="420" width="500" height="190" rx="18" fill="#ede9fe"/>
    <rect x="658" y="449" width="64" height="64" rx="16" fill="#7c3aed"/>
    <text x="676" y="491" font-size="34" fill="#fff" font-family="Arial">✓</text>
    <text x="746" y="466" class="card-title">claude-desktop-buddy-bridge</text>
    <text x="746" y="498" class="repo">cuiqingwei/claude-desktop-buddy-bridge</text>
    <text x="658" y="545" class="card-sub">Claude Code CLI 到 M5StickC Plus 的 BLE 审批桥</text>
    <text x="658" y="575" class="small">用实体按键 approve / deny 敏感操作，把 AI 权限控制拉回手边。</text>
    <rect x="986" y="452" width="98" height="30" rx="15" fill="#ddd6fe"/>
    <text x="1011" y="473" class="tag">硬件</text>
  </g>
</svg>
